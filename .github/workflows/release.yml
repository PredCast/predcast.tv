name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  deployments: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/predcast/chiliztv-backend

jobs:
  # ── Validate tag ──────────────────────────────────────────────────────────
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      prerelease: ${{ steps.semver.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assert tag is reachable from main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
            echo "Tag ${{ github.ref_name }} is not on main — aborting."
            exit 1
          fi

      - name: Parse semver
        id: semver
        run: |
          TAG="${{ github.ref_name }}"
          # Strip leading 'v'
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Detect prerelease (e.g. v1.0.0-rc.1)
          if echo "$VERSION" | grep -qE '-(alpha|beta|rc)'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Retag image :main → :vX.Y.Z ──────────────────────────────────────────
  retag-image:
    name: Retag image
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag :main → :${{ github.ref_name }}
        run: |
          docker pull ${{ env.IMAGE_NAME }}:main
          docker tag  ${{ env.IMAGE_NAME }}:main ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          docker push ${{ env.IMAGE_NAME }}:${{ github.ref_name }}

  # ── Sign image with cosign (Sigstore keyless) ─────────────────────────────
  sign-image:
    name: Sign image
    runs-on: ubuntu-latest
    needs: retag-image
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image (keyless OIDC)
        run: cosign sign --yes ${{ env.IMAGE_NAME }}:${{ github.ref_name }}

  # ── Verify image signature before deploying ───────────────────────────────
  verify-image:
    name: Verify image signature
    runs-on: ubuntu-latest
    needs: sign-image
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify signature
        run: |
          cosign verify \
            --certificate-identity-regexp="^https://github\\.com/${{ github.repository }}/\\.github/workflows/release\\.yml@refs/tags/v[0-9]+\\.[0-9]+\\.[0-9]+(-(alpha|beta|rc)\\.[0-9]+)?$" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}

  # ── Deploy API to production ──────────────────────────────────────────────
  deploy-api-prod:
    name: Deploy API (prod)
    runs-on: ubuntu-latest
    needs: [validate, verify-image]
    if: needs.validate.outputs.prerelease == 'false'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_API }}
        run: |
          flyctl deploy \
            --config infra/fly/api.prod.toml \
            --image ${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            --strategy rolling \
            --wait-timeout 180

      - name: Smoke — GET /health
        # `|| echo "000"` neutralises curl's non-zero exit (28 on timeout,
        # 7 on connection refused, etc.) so `set -e` doesn't kill the
        # script before the retry loop can fire. Without this, a slow
        # boot on `--strategy immediate` would fail the whole job after
        # ONE curl timeout (~10s) instead of retrying 5×.
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://api.predcast.tv/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "API health check passed (attempt $i)"
              exit 0
            fi
            echo "API health check attempt $i — got $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "API health check failed after 5 attempts"
          exit 1

  # ── Deploy workers to production ──────────────────────────────────────────
  deploy-workers-prod:
    name: Deploy workers (prod)
    runs-on: ubuntu-latest
    needs: [validate, verify-image]
    if: needs.validate.outputs.prerelease == 'false'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy workers
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_WORKERS }}
        run: |
          flyctl deploy \
            --config infra/fly/workers.prod.toml \
            --image ${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            --strategy immediate \
            --wait-timeout 180

      - name: Smoke — GET /health
        # See API job above for why `|| echo "000"` is required.
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://workers.predcast.tv/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Workers health check passed (attempt $i)"
              exit 0
            fi
            echo "Workers health check attempt $i — got $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "Workers health check failed after 5 attempts"
          exit 1

  # ── Promote Vercel staging → production ───────────────────────────────────
  deploy-app-prod:
    name: Deploy app (prod)
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.prerelease == 'false'
    environment: production
    steps:
      # Always do a fresh prod build+deploy. We can't promote the staging
      # deployment URL because deploy-app.yml builds staging with
      # `--target=staging`, and `vercel promote` on a non-production target
      # requires interactive confirmation (Vercel asks "rebuild for prod?")
      # — that prompt hangs forever in CI and the CLI crashes with EPIPE.
      # The promote optimisation is only valid if both staging and prod
      # targets share the same build artifact, which isn't our case
      # (NEXT_PUBLIC_STAGING + a few env vars differ between targets).
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build + deploy to prod
        # `--scope=predcast` forces the CLI to operate against the predcast
        # team rather than the personal default team — without it, even with
        # VERCEL_ORG_ID set, `vercel pull` has been observed to target the
        # token's owner team and fail.
        run: |
          npx -y vercel@latest pull --yes --environment=production --scope=predcast --token=${{ secrets.VERCEL_TOKEN }}
          npx -y vercel@latest build --prod --token=${{ secrets.VERCEL_TOKEN }}
          npx -y vercel@latest deploy --prebuilt --prod --scope=predcast --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_APP }}

  # ── Deploy admin panel to prod ────────────────────────────────────────────
  deploy-admin-prod:
    name: Deploy admin (prod)
    runs-on: ubuntu-latest
    needs: validate
    # Skipped (not failed) while the Vercel admin project doesn't exist yet —
    # drop the secret guard once VERCEL_PROJECT_ID_ADMIN is set.
    if: needs.validate.outputs.prerelease == 'false'
    environment: production
    env:
      ADMIN_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
    steps:
      - uses: actions/checkout@v4
        if: env.ADMIN_PROJECT_ID != ''

      - uses: pnpm/action-setup@v4
        if: env.ADMIN_PROJECT_ID != ''
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        if: env.ADMIN_PROJECT_ID != ''
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        if: env.ADMIN_PROJECT_ID != ''
        run: pnpm install --frozen-lockfile

      - name: Build + deploy to prod
        if: env.ADMIN_PROJECT_ID != ''
        run: |
          npx -y vercel@latest pull --yes --environment=production --scope=predcast --token=${{ secrets.VERCEL_TOKEN }}
          npx -y vercel@latest build --prod --token=${{ secrets.VERCEL_TOKEN }}
          npx -y vercel@latest deploy --prebuilt --prod --scope=predcast --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}

  # ── Sentry release ────────────────────────────────────────────────────────
  sentry-release:
    name: Sentry release (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: [deploy-api-prod, deploy-app-prod]
    if: needs.validate.outputs.prerelease == 'false'
    continue-on-error: true
    strategy:
      matrix:
        project: [predcast-frontend, predcast-backend, predcast-landing]
    # Injecting the secret as a job-level env lets us reference it via
    # `env.SENTRY_TOKEN` in step-level `if:` conditions. GitHub Actions
    # rejects `${{ secrets.X }}` in step `if:` since the 2024 security
    # hardening (workflow fails to parse with 0 jobs run) — going through
    # `env` is the documented workaround.
    env:
      SENTRY_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Sentry release
        if: env.SENTRY_TOKEN != ''
        uses: getsentry/action-release@v3
        with:
          environment: production
          release: ${{ github.ref_name }}
        env:
          SENTRY_AUTH_TOKEN: ${{ env.SENTRY_TOKEN }}
          SENTRY_ORG: predcast
          SENTRY_PROJECT: ${{ matrix.project }}

  # ── Create GitHub Release ─────────────────────────────────────────────────
  create-github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [deploy-api-prod, deploy-workers-prod, deploy-app-prod]
    if: needs.validate.outputs.prerelease == 'false'
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag

  # ── Discord notification ──────────────────────────────────────────────────
  notify-discord:
    name: Notify Discord
    runs-on: ubuntu-latest
    # Depend on every job that materially affects the release outcome — not
    # just create-github-release. Otherwise `contains(needs.*.result, ...)`
    # only sees ONE result and reports SUCCESS even when an upstream deploy
    # failed (downstream jobs end up `skipped`, which is not `failure`).
    # We also check for `cancelled` and `skipped` (skipped here means an
    # upstream needed job failed, transitively a failure).
    needs:
      - validate
      - retag-image
      - sign-image
      - verify-image
      - deploy-api-prod
      - deploy-workers-prod
      - deploy-app-prod
      - create-github-release
    if: always() && needs.validate.outputs.prerelease == 'false'
    steps:
      - name: Post release notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATUS: ${{ (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped')) && 'FAILED' || 'SUCCESS' }}
          COLOR: ${{ (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped')) && '15158332' || '3066993' }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "Release '"${{ github.ref_name }}"' — '"$STATUS"'",
                "color": '"$COLOR"',
                "fields": [
                  {"name": "Version", "value": "'"${{ github.ref_name }}"'", "inline": true},
                  {"name": "Status", "value": "'"$STATUS"'", "inline": true},
                  {"name": "Release", "value": "[View release]('"${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }})"'", "inline": false}
                ]
              }]
            }'
