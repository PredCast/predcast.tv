name: Deploy workers — staging

on:
  push:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - 'packages/**'
      - 'Dockerfile'
      - 'pnpm-lock.yaml'

concurrency:
  group: deploy-workers-staging
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/predcast/chiliztv-backend

jobs:
  # ── Wait for the API build job to push the image ──────────────────────────
  # deploy-api.yml runs in parallel on the same push event and builds the image.
  # This job polls GHCR until the short-sha tag is available before deploying.
  wait-for-image:
    name: Wait for image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.sha.outputs.short_sha }}
    steps:
      - name: Compute short SHA
        id: sha
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Poll until image tag exists
        run: |
          TAG=${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short_sha }}
          for i in $(seq 1 24); do
            if docker manifest inspect "$TAG" > /dev/null 2>&1; then
              echo "Image $TAG is available (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: image not yet available — waiting 30s"
            sleep 30
          done
          echo "Image $TAG not found after 12 minutes"
          exit 1

  # ── Deploy to Fly.io staging ──────────────────────────────────────────────
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: wait-for-image
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy workers to staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_WORKERS_STAGING }}
        run: |
          flyctl deploy \
            --config infra/fly/workers.staging.toml \
            --image ${{ env.IMAGE_NAME }}:${{ needs.wait-for-image.outputs.image_tag }} \
            --strategy immediate \
            --wait-timeout 120

      - name: Smoke — GET /health
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
              https://chiliztv-workers-staging.fly.dev/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s"
            sleep 10
          done
          echo "Health check failed after 12 attempts"
          exit 1

      - name: Dump Fly logs on smoke failure
        if: failure()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_WORKERS_STAGING }}
        run: flyctl logs --app chiliztv-workers-staging -n 200 || true

  # ── Notify on success ─────────────────────────────────────────────────────
  notify-success:
    name: Notify success
    runs-on: ubuntu-latest
    needs: [wait-for-image, deploy-staging]
    if: success()
    steps:
      - name: Post Discord success
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "Deploy workers staging — SUCCESS",
                "color": 3066993,
                "fields": [
                  {"name": "Branch", "value": "${{ github.ref_name }}", "inline": true},
                  {"name": "Commit", "value": "${{ github.sha }}", "inline": true},
                  {"name": "Run", "value": "[View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
                ]
              }]
            }'

  # ── Notify on failure ─────────────────────────────────────────────────────
  notify-failure:
    name: Notify failure
    runs-on: ubuntu-latest
    needs: [wait-for-image, deploy-staging]
    if: failure()
    steps:
      - name: Post Discord alert
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "Deploy workers staging — FAILED",
                "color": 15158332,
                "fields": [
                  {"name": "Branch", "value": "${{ github.ref_name }}", "inline": true},
                  {"name": "Commit", "value": "${{ github.sha }}", "inline": true},
                  {"name": "Run", "value": "[View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
                ]
              }]
            }'
