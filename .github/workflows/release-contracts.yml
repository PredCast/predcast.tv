name: Release — smart contracts

# Manual trigger only — never automated.
# Deploying contracts is an irreversible on-chain operation that requires
# explicit intent from a maintainer with ADMIN_PRIVATE_KEY access.
on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        type: choice
        options:
          - spicy
          - mainnet
      script:
        description: 'Foundry deploy script (e.g. DeployAll.s.sol)'
        required: true
        default: 'DeployAll.s.sol'
      dry_run:
        description: 'Dry run (simulate only, no broadcast)'
        required: false
        type: boolean
        default: true

concurrency:
  group: release-contracts
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  # ── Run Foundry tests before deploying ────────────────────────────────────
  test:
    name: Foundry tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run tests
        working-directory: apps/smart-contracts/chiliz-tv
        run: forge test -vvv

  # ── Deploy contracts ──────────────────────────────────────────────────────
  deploy:
    name: Deploy contracts
    runs-on: ubuntu-latest
    needs: test
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Deploy (or simulate)
        working-directory: apps/smart-contracts/chiliz-tv
        env:
          ADMIN_PRIVATE_KEY: ${{ secrets.ADMIN_PRIVATE_KEY }}
          NETWORK: ${{ inputs.network }}
        run: |
          SCRIPT="${{ inputs.script }}"
          DRY_RUN="${{ inputs.dry_run }}"

          if [ "$NETWORK" = "spicy" ]; then
            RPC_URL="https://spicy-rpc.chiliz.com"
          else
            RPC_URL="https://rpc.chiliz.com"
          fi

          FLAGS="--rpc-url $RPC_URL --private-key $ADMIN_PRIVATE_KEY"

          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN — simulating only (no broadcast)"
            forge script "script/$SCRIPT" $FLAGS
          else
            echo "LIVE DEPLOY — broadcasting to $NETWORK"
            forge script "script/$SCRIPT" $FLAGS --broadcast --verify
          fi

  # ── Sync ABIs to packages/blockchain ─────────────────────────────────────
  sync-abis:
    name: Sync ABIs
    runs-on: ubuntu-latest
    needs: deploy
    if: inputs.dry_run == false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build contracts (generate ABIs)
        working-directory: apps/smart-contracts/chiliz-tv
        run: forge build

      - name: Sync ABIs to packages/blockchain
        working-directory: apps/smart-contracts/chiliz-tv
        run: node script/contracts.ts

      - name: Open PR with ABI diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/contracts-abi-sync-$(date +%Y%m%d-%H%M)"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add packages/blockchain/
          git diff --cached --quiet && echo "No ABI changes to commit" && exit 0
          git commit -m "chore(contracts): sync ABIs after ${{ inputs.script }} deploy on ${{ inputs.network }}"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(contracts): sync ABIs — ${{ inputs.network }} deploy" \
            --body "Automated ABI sync after deploying \`${{ inputs.script }}\` on **${{ inputs.network }}**." \
            --base development \
            --head "$BRANCH" \
            --label "area:contracts"
