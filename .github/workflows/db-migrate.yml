name: DB migrate

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Environment to migrate'
        type: choice
        options: [staging, production]
        default: staging
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
    # No `paths` filter on purpose. We want:
    #   - main push                                  → migrate staging
    #   - tag v*.*.* push                            → migrate prod
    # `paths` would skip tag pushes that don't change migration files
    # (tags rarely do), so we'd lose the "tag = migrate prod" guarantee.
    # `supabase db push` is a no-op when no migrations are pending, so
    # the extra cost is ~30s of idempotent CI work per run.

concurrency:
  # Never cancel an in-progress migration.
  group: db-migrate
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── Validate migration sequence ───────────────────────────────────────────
  validate-sequence:
    name: Validate sequence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check migration filenames and sequence
        run: node apps/backend/scripts/validate-migrations.mjs

  # ── Apply on staging ──────────────────────────────────────────────────────
  migrate-staging:
    name: Migrate staging
    runs-on: ubuntu-latest
    needs: validate-sequence
    # Staging migrates on every main push (mirrors `:main` image builds in
    # CI). Tag pushes skip this job — they're for prod releases, and the
    # `staging` env policy doesn't allow tag refs anyway.
    if: github.ref == 'refs/heads/main' && (github.event_name != 'workflow_dispatch' || inputs.target == 'staging')
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations to staging
        working-directory: apps/backend
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF_STAGING }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_STAGING }}
        run: |
          supabase login --token "$SUPABASE_ACCESS_TOKEN"
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          # Baseline: 000-020 were applied manually before the migration system
          # was wired up. Mark them as applied so `db push` skips re-running.
          # `repair --status applied` on an already-tracked version no-ops.
          for v in 000 001 002 003 004 005 006 007 008 009 010 011 012 013 014 015 016 017 018 019 020; do
            supabase migration repair --status applied "$v" || true
          done
          supabase db push

      - name: Report pending diff
        working-directory: apps/backend
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF_STAGING }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_STAGING }}
        # Warning-only: known drift exists between migrations and the Cloud
        # project (Supabase auto-extensions like pg_net, helper functions
        # added via Studio before the migration system). The push above is
        # what actually matters; the diff is logged for visibility.
        run: |
          DIFF=$(supabase db diff --linked 2>&1 || true)
          if [ -n "$DIFF" ]; then
            echo "::warning ::Schema drift detected between migrations and staging DB"
            echo "$DIFF"
          else
            echo "No pending diff — staging schema is in sync"
          fi

  # ── Apply on production (only on tag push) ────────────────────────────────
  migrate-prod:
    name: Migrate production
    runs-on: ubuntu-latest
    # Depend on validate-sequence directly, NOT on migrate-staging:
    # staging is `if: refs/heads/main` and would be `skipped` on a tag
    # push — a `needs: migrate-staging` here would propagate that skip and
    # silently fail prod (the bug we just lived through with v1.1.x).
    needs: validate-sequence
    # Tag push = release flow. workflow_dispatch with target=production allows
    # out-of-band runs (e.g. history repair) without cutting a new tag.
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations to production
        working-directory: apps/backend
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase login --token "$SUPABASE_ACCESS_TOKEN"
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          # Diagnostic: log local vs remote history before touching anything.
          supabase migration list --linked || true
          # Baseline through 035: prod schema was maintained out-of-band until
          # migrate-prod first actually ran (v1.2.0 — every object up to 035
          # already existed; the push died on 030's non-idempotent constraint).
          # Marking them applied prevents re-running them — critical for 022,
          # whose DROP TABLE bets would wipe live indexer data on a re-run.
          # `repair --status applied` no-ops on already-tracked versions.
          for v in 000 001 002 003 004 005 006 007 008 009 010 011 012 013 014 015 016 017 018 019 020 021 022 023 024 025 026 027 028 029 030 031 032 033 034 035; do
            supabase migration repair --status applied "$v" || true
          done
          supabase db push

      - name: Report pending diff
        working-directory: apps/backend
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        # See migrate-staging — same warning-only policy on prod.
        run: |
          DIFF=$(supabase db diff --linked 2>&1 || true)
          if [ -n "$DIFF" ]; then
            echo "::warning ::Schema drift detected between migrations and production DB"
            echo "$DIFF"
          else
            echo "No pending diff — production schema is in sync"
          fi
