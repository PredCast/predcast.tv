name: Deploy landing — Cloudflare Pages

# Two CF Pages projects back this workflow:
#   chiliztv-landing       — staging, served at staging.chiliztv.com
#   chiliztv-landing-prod  — production, will be served at chiliztv.com once
#                            the custom domain is attached on CF Pages.
# Push main deploys to staging; tag v*.*.* deploys to production.
# The paths filter applies only to branch pushes; tags trigger regardless.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/landing/**'
      - 'packages/ui/**'
  push:
    branches:
      - main
    paths:
      - 'apps/landing/**'
      - 'packages/ui/**'
    tags:
      - 'v*.*.*'

concurrency:
  group: deploy-landing-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── PR preview ────────────────────────────────────────────────────────────
  build-deploy-preview:
    name: Preview deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build landing (static export)
        run: pnpm --filter "@chiliztv.com/landing" build
        env:
          NEXT_PUBLIC_APP_URL: https://app-staging.chiliztv.com
          NEXT_PUBLIC_API_URL: https://api-staging.chiliztv.com
          NEXT_PUBLIC_DYNAMIC_ENVIRONMENT_ID: 8d9de814-ed4b-479a-ab44-277b7ca94076
          NEXT_PUBLIC_STAGING_DYNAMIC_ENVIRONMENT_ID: 8d9de814-ed4b-479a-ab44-277b7ca94076
          NEXT_PUBLIC_STAGING: 'true'

      - name: Deploy to Cloudflare Pages (PR branch)
        id: deploy
        # Preview previews land on the staging project, isolated from prod.
        run: |
          OUTPUT=$(pnpm exec wrangler pages deploy apps/landing/out \
            --project-name=chiliztv-landing \
            --branch="$HEAD_REF" \
            --commit-hash=${{ github.sha }} 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oE 'https://[^ ]+\.pages\.dev' | tail -1)
          echo "deployment-url=${URL}" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          HEAD_REF: ${{ github.head_ref }}

  # ── Staging deploy (push main) ────────────────────────────────────────────
  # Targets the chiliztv-landing project, custom domain staging.chiliztv.com.
  build-deploy-staging:
    name: Staging deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build landing (static export)
        run: pnpm --filter "@chiliztv.com/landing" build
        env:
          NEXT_PUBLIC_APP_URL: https://app-staging.chiliztv.com
          NEXT_PUBLIC_API_URL: https://api-staging.chiliztv.com
          NEXT_PUBLIC_DYNAMIC_ENVIRONMENT_ID: 8d9de814-ed4b-479a-ab44-277b7ca94076
          NEXT_PUBLIC_STAGING_DYNAMIC_ENVIRONMENT_ID: 8d9de814-ed4b-479a-ab44-277b7ca94076
          NEXT_PUBLIC_STAGING: 'true'

      - name: Deploy to Cloudflare Pages (staging project)
        id: deploy
        run: |
          OUTPUT=$(pnpm exec wrangler pages deploy apps/landing/out \
            --project-name=chiliztv-landing \
            --branch=main \
            --commit-hash=${{ github.sha }} 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oE 'https://[^ ]+\.pages\.dev' | tail -1)
          echo "deployment-url=${URL}" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── Production deploy (tag v*.*.*) ────────────────────────────────────────
  # Targets the chiliztv-landing-prod project, custom domain chiliztv.com (to
  # be attached on CF Pages before the first prod tag).
  build-deploy-production:
    name: Production deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: production
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build landing (static export)
        run: pnpm --filter "@chiliztv.com/landing" build
        env:
          NEXT_PUBLIC_APP_URL: https://app.chiliztv.com
          NEXT_PUBLIC_API_URL: https://api.chiliztv.com
          NEXT_PUBLIC_DYNAMIC_ENVIRONMENT_ID: 8d9de814-ed4b-479a-ab44-277b7ca94076
          NEXT_PUBLIC_STAGING_DYNAMIC_ENVIRONMENT_ID: 8d9de814-ed4b-479a-ab44-277b7ca94076
          NEXT_PUBLIC_STAGING: 'false'

      - name: Deploy to Cloudflare Pages (production project)
        id: deploy
        run: |
          OUTPUT=$(pnpm exec wrangler pages deploy apps/landing/out \
            --project-name=chiliztv-landing-prod \
            --branch=main \
            --commit-hash=${{ github.sha }} 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oE 'https://[^ ]+\.pages\.dev' | tail -1)
          echo "deployment-url=${URL}" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── Comment PR with preview URL ───────────────────────────────────────────
  comment-preview:
    name: Comment preview URL
    runs-on: ubuntu-latest
    needs: build-deploy-preview
    if: github.event_name == 'pull_request'
    steps:
      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ needs.build-deploy-preview.outputs.deployment_url }}';
            const body = `## Landing preview\n\nCF Pages preview: ${url || '_(URL not available — check workflow logs)_'}\n\n_Deployed from commit \`${{ github.sha }}\`_`;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.startsWith('## Landing preview'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ── Staging smoke (push main only) ────────────────────────────────────────
  smoke-staging:
    name: Smoke staging
    runs-on: ubuntu-latest
    needs: build-deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: GET https://staging.chiliztv.com
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://staging.chiliztv.com/)
          if [ "$STATUS" = "200" ]; then
            echo "Landing smoke passed (HTTP $STATUS)"
          else
            echo "Landing smoke failed (HTTP $STATUS)"
            exit 1
          fi

  # ── Production smoke (tag deploy only) ────────────────────────────────────
  # Will fail until the chiliztv.com custom domain is attached to the
  # chiliztv-landing-prod project on CF Pages.
  smoke-production:
    name: Smoke production
    runs-on: ubuntu-latest
    needs: build-deploy-production
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: GET https://chiliztv.com
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://chiliztv.com/)
          if [ "$STATUS" = "200" ]; then
            echo "Landing smoke passed (HTTP $STATUS)"
          else
            echo "Landing smoke failed (HTTP $STATUS)"
            exit 1
          fi

  # ── Notify on success (staging push or production tag) ──────────────────
  notify-success:
    name: Notify success
    runs-on: ubuntu-latest
    needs: [build-deploy-staging, build-deploy-production]
    if: |
      always() && github.event_name == 'push' &&
      (needs.build-deploy-staging.result == 'success' || needs.build-deploy-production.result == 'success')
    steps:
      - name: Post Discord success
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "Deploy landing — SUCCESS",
                "color": 3066993,
                "fields": [
                  {"name": "Ref", "value": "${{ github.ref_name }}", "inline": true},
                  {"name": "Commit", "value": "${{ github.sha }}", "inline": true},
                  {"name": "Run", "value": "[View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
                ]
              }]
            }'

  # ── Notify on failure (staging push or production tag) ──────────────────
  notify-failure:
    name: Notify failure
    runs-on: ubuntu-latest
    needs: [build-deploy-staging, build-deploy-production, smoke-staging, smoke-production]
    if: |
      always() && github.event_name == 'push' &&
      (needs.build-deploy-staging.result == 'failure' ||
       needs.build-deploy-production.result == 'failure' ||
       needs.smoke-staging.result == 'failure' ||
       needs.smoke-production.result == 'failure')
    steps:
      - name: Post Discord alert
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "Deploy landing — FAILED",
                "color": 15158332,
                "fields": [
                  {"name": "Ref", "value": "${{ github.ref_name }}", "inline": true},
                  {"name": "Commit", "value": "${{ github.sha }}", "inline": true},
                  {"name": "Run", "value": "[View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
                ]
              }]
            }'
