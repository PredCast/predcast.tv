name: chiliztv-local

services:
  redis:
    image: redis:7.4-alpine
    container_name: chiliztv-redis-local
    ports:
      - "6379:6379"
    command:
      - redis-server
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped
