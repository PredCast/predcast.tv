# Fly.io config — chiliztv-workers-staging
# Staging only. Production config lives in workers.prod.toml (created at J8).
# Deploy via: flyctl deploy --config infra/fly/workers.staging.toml

app = "chiliztv-workers-staging"
primary_region = "cdg"

[build]
  # Image is reused from the API build — same backend image, different PROCESS_ROLE.

[env]
  NODE_ENV = "production"
  PORT = "3001"
  # Workers process: runs JobScheduler + BlockchainEventListener, serves /health only.
  PROCESS_ROLE = "worker"

[http_service]
  internal_port = 3001
  force_https = true
  # Workers run the BlockchainEventListener + JobScheduler continuously.
  # Auto-stop would let the indexer fall behind silently — keep the machine
  # always-on. `min_machines_running=2` provides HA: distributed lock in
  # JobScheduler ensures only one instance grabs each tick, so two workers
  # in parallel is safe (and one being recreated by Fly leaves the other
  # serving the cron path uninterrupted).
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 2
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

# Always-restart guard: if the node process exits (crash, panic, exit 0),
# Fly relaunches the machine instead of leaving it Stopped.
[[restart]]
  policy = "always"
  retries = 10

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
