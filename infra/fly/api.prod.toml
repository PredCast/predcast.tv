# Fly.io config — chiliztv-api (production)
# Deployed only by release.yml on tag vX.Y.Z.

app = "chiliztv-api"
primary_region = "cdg"

[env]
  NODE_ENV = "production"
  PORT = "3001"
  PROCESS_ROLE = "api"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
