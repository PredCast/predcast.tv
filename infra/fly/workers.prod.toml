# Fly.io config — chiliztv-workers (production)
# Deployed only by release.yml on tag vX.Y.Z.

app = "chiliztv-workers"
primary_region = "cdg"

[env]
  NODE_ENV = "production"
  PORT = "3001"
  PROCESS_ROLE = "worker"

[http_service]
  internal_port = 3001
  force_https = true
  # Workers run the BlockchainEventListener + JobScheduler continuously.
  # Auto-stop would let the indexer fall behind silently — keep the machine
  # always-on. `min_machines_running=2` provides HA: if one machine crashes
  # the other keeps the JobScheduler running (distributed lock handles the
  # concurrency cleanly, only one instance grabs each tick).
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 2
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

# Always-restart guard: if the node process exits (crash, panic, exit 0),
# Fly relaunches the machine instead of leaving it Stopped.
[[restart]]
  policy = "always"
  retries = 10

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
